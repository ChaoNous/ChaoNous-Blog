            - generic [ref=e519]:
              - generic [ref=e520]:
                - heading "面对情绪倾诉的本能反应#" [level=2] [ref=e521]:
                  - text: 面对情绪倾诉的本能反应
                  - link "#" [ref=e522] [cursor=pointer]:
                    - /url: "#面对情绪倾诉的本能反应"
                - paragraph [ref=e523]: 我在与女生聊天的时候，通常出现如下场景：
                - paragraph [ref=e524]: 该女生抛出一个话题——最近遇到了某某事情，让她感到很生气或是难过。面对这种充满情绪的倾诉，我的第一反应往往是直接跳进理性模式，给出的回答通常就两招：
                - paragraph [ref=e525]: 先是很习惯地把她的遭遇”普遍化”——“这很正常啊，这样的事我见多了，我还遇到过更离谱的……”潜台词是：这在人生的概率里就是常态，没必要这么生气或难过吧。
                - paragraph [ref=e526]: 然后再试着从理性角度帮她分析利弊，给出一个我认为最可行的解决方案。
                - paragraph [ref=e527]: 然而，这样的对话往往是不可持续的，通常会在对方的沉默或无奈中收场。事后回想，我想她们当时希望我回答的大抵是几句温暖安慰的话，但这对我来说却很难做到，或者说，我的思维惯性很难适应这种语境、很难转过这个弯来。令我记忆尤深的是：初中的时候有个女生喜欢我，在发生了上述情景后，她有些委屈又很直白地对我说：“你干嘛不哄哄我呀？”
                - paragraph [ref=e528]: 然而，从那时候一直直到如今，我也依然无法做到”哄”这个动作。
              - generic [ref=e529]:
                - heading "理智背后的极端实用主义#" [level=2] [ref=e530]:
                  - text: 理智背后的极端实用主义
                  - link "#" [ref=e531] [cursor=pointer]:
                    - /url: "#理智背后的极端实用主义"
                - paragraph [ref=e532]: 说到底，我是抱着一种极端的”实用主义”态度去聊天的——我觉得自己说出口的话，必须对解决眼前的问题有实际帮助！因为这种固执的预设，很多时候我常常感到无话可聊。在屏幕前斟酌半天，好不容易挤出几个字来，感觉自己简直比 AI 还要”人机”。反观女生聊天，她们似乎总是很自然地流露出丰富的情绪，那种鲜活的共情力，是我这套实用主义逻辑怎么也够不着的。
              - generic [ref=e533]:
                - heading "理工男的情感困境与责任感#" [level=2] [ref=e534]:
                  - text: 理工男的情感困境与责任感
                  - link "#" [ref=e535] [cursor=pointer]:
                    - /url: "#理工男的情感困境与责任感"
                - paragraph [ref=e536]: 很多理工科男生在感情里显得木讷，或者带有一种习惯性的”炫压抑”特质，可能皆与此有关。在他的世界里，他可能是真切关心你的，默默做的事也确实是对你好的，但你就是无法从他身上感受到”情绪价值”的存在。这或许与男性的成长环境，以及一直以来被灌输的责任感息息相关——从小我们就被教育，男性要承担、要背负起重任，要直面冷冰冰的现实。长辈们总说，光夸夸其谈是不行的，必须去解决实际问题。
                - paragraph [ref=e537]: 于是，我们误以为替对方解决问题，就是最高级的温柔。可惜的是，这种用纯理性去填补情感沟壑的做法，和现在强调情感共鸣的社会氛围越来越不搭了。就像用尺子去测量海浪的温度，越是认真，越是不对劲。
            - generic [ref=e539]:
