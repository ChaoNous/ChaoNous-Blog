<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="robots" content="noindex,nofollow,noarchive" />
	<title>Admin Unavailable | ChaoNous</title>
	<style>
		:root {
			color-scheme: light dark;
			font-family: "Crimson Pro", "Zhuque Fangsong UI", serif;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 2rem;
			background:
				radial-gradient(circle at top, rgba(160, 32, 32, 0.1), transparent 40%),
				linear-gradient(180deg, #f6f1ec 0%, #efe7df 100%);
			color: #241816;
		}

		main {
			width: min(100%, 42rem);
			padding: 2rem;
			border: 1px solid rgba(36, 24, 22, 0.08);
			border-radius: 1.25rem;
			background: rgba(255, 255, 255, 0.78);
			box-shadow: 0 1.25rem 3rem rgba(36, 24, 22, 0.08);
			backdrop-filter: blur(14px);
		}

		h1 {
			margin: 0 0 1rem;
			font-size: clamp(1.8rem, 4vw, 2.4rem);
			line-height: 1.1;
		}

		p {
			margin: 0;
			font-size: 1rem;
			line-height: 1.75;
		}

		.note {
			margin-top: 1rem;
			color: rgba(36, 24, 22, 0.72);
		}

		a {
			color: inherit;
			font-weight: 600;
		}

		@media (prefers-color-scheme: dark) {
			body {
				background:
					radial-gradient(circle at top, rgba(210, 112, 80, 0.18), transparent 38%),
					linear-gradient(180deg, #2a1d1a 0%, #1a1211 100%);
				color: #f4ede7;
			}

			main {
				border-color: rgba(244, 237, 231, 0.08);
				background: rgba(35, 24, 22, 0.82);
				box-shadow: 0 1.25rem 3rem rgba(0, 0, 0, 0.28);
			}

			.note {
				color: rgba(244, 237, 231, 0.72);
			}
		}
	</style>
</head>
<body>
	<main>
		<h1>后台入口已临时关闭</h1>
		<p>出于安全原因，这个页面不再内嵌管理密码或静态令牌。评论管理后台会在接入受保护的认证方案后再重新开放。</p>
		<p class="note">当前状态是有意的安全下线，不是页面故障。返回 <a href="/">首页</a>。</p>
	</main>
</body>
</html>
