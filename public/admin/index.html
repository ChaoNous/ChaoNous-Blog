<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="robots" content="noindex,nofollow,noarchive" />
	<title>&#x8BC4;&#x8BBA;&#x540E;&#x53F0; | ChaoNous</title>
	<style>
		:root {
			color-scheme: light dark;
			font-family: "Crimson Pro", "Zhuque Fangsong UI", serif;
			background:
				radial-gradient(circle at top, rgba(171, 92, 61, 0.16), transparent 36%),
				linear-gradient(180deg, #f6f1ec 0%, #efe7df 100%);
			color: #241816;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			padding: 2rem;
			background: inherit;
			color: inherit;
		}

		main {
			width: min(100%, 72rem);
			margin: 0 auto;
			display: grid;
			gap: 1.25rem;
		}

		.panel {
			border: 1px solid rgba(36, 24, 22, 0.08);
			border-radius: 1.5rem;
			background: rgba(255, 255, 255, 0.8);
			box-shadow: 0 1.25rem 3rem rgba(36, 24, 22, 0.08);
			backdrop-filter: blur(16px);
			padding: 1.25rem;
		}

		h1, h2, p {
			margin: 0;
		}

		.stack {
			display: grid;
			gap: 0.85rem;
		}

		.row {
			display: flex;
			flex-wrap: wrap;
			gap: 0.8rem;
			align-items: center;
		}

		input, select, button, textarea {
			font: inherit;
		}

		input, select {
			width: 100%;
			border-radius: 999px;
			border: 1px solid rgba(36, 24, 22, 0.12);
			padding: 0.75rem 1rem;
			background: rgba(255, 255, 255, 0.88);
		}

		button {
			border: 0;
			border-radius: 999px;
			padding: 0.75rem 1rem;
			cursor: pointer;
			font-weight: 700;
			background: #241816;
			color: #fff;
		}

		button.secondary {
			background: rgba(36, 24, 22, 0.08);
			color: #241816;
		}

		.notice {
			border-radius: 1rem;
			padding: 0.85rem 1rem;
			font-size: 0.95rem;
			background: rgba(36, 24, 22, 0.05);
		}

		.notice.error {
			background: rgba(193, 54, 43, 0.1);
			color: #8c2519;
		}

		.comment-list {
			display: grid;
			gap: 0.85rem;
		}

		.comment-card {
			border-radius: 1.2rem;
			border: 1px solid rgba(36, 24, 22, 0.08);
			padding: 1rem;
			display: grid;
			gap: 0.7rem;
			background: rgba(255, 255, 255, 0.56);
		}

		.comment-meta {
			display: flex;
			flex-wrap: wrap;
			gap: 0.5rem 1rem;
			font-size: 0.92rem;
			color: rgba(36, 24, 22, 0.68);
		}

		.comment-content {
			line-height: 1.85;
			white-space: pre-wrap;
			word-break: break-word;
		}

		.comment-actions {
			display: flex;
			flex-wrap: wrap;
			gap: 0.65rem;
		}

		@media (prefers-color-scheme: dark) {
			:root {
				background:
					radial-gradient(circle at top, rgba(210, 112, 80, 0.18), transparent 38%),
					linear-gradient(180deg, #2a1d1a 0%, #1a1211 100%);
				color: #f4ede7;
			}

			.panel {
				border-color: rgba(244, 237, 231, 0.08);
				background: rgba(35, 24, 22, 0.82);
				box-shadow: 0 1.25rem 3rem rgba(0, 0, 0, 0.28);
			}

			input, select {
				border-color: rgba(244, 237, 231, 0.1);
				background: rgba(24, 17, 16, 0.88);
				color: inherit;
			}

			button.secondary {
				background: rgba(244, 237, 231, 0.08);
				color: inherit;
			}

			.notice {
				background: rgba(244, 237, 231, 0.06);
			}

			.comment-card {
				border-color: rgba(244, 237, 231, 0.08);
				background: rgba(255, 255, 255, 0.03);
			}

			.comment-meta {
				color: rgba(244, 237, 231, 0.68);
			}
		}
	</style>
</head>
<body>
	<main>
		<section class="panel stack">
			<h1>&#x8BC4;&#x8BBA;&#x540E;&#x53F0;</h1>
			<p>&#x540E;&#x53F0;&#x8FD0;&#x884C;&#x5728;&#x540C;&#x57DF; API &#x4E4B;&#x4E0A;&#xFF0C;&#x4E0D;&#x518D;&#x4F9D;&#x8D56;&#x7AD9;&#x5916;&#x8BC4;&#x8BBA;&#x670D;&#x52A1;&#x3002;</p>
			<p>&#x5F53;&#x524D;&#x6A21;&#x5F0F;&#xFF1A;&#x65B0;&#x8BC4;&#x8BBA;&#x9ED8;&#x8BA4;&#x76F4;&#x63A5;&#x53D1;&#x5E03;&#xFF0C;&#x65E0;&#x9700;&#x5BA1;&#x6838;&#x3002;</p>
		</section>

		<section class="panel stack">
			<form id="admin-form" class="stack">
			<div class="row">
				<input id="admin-password" type="password" placeholder="&#x8F93;&#x5165;&#x8BC4;&#x8BBA;&#x540E;&#x53F0;&#x5BC6;&#x7801;" />
				<select id="comment-status">
					<option value="approved">&#x5DF2;&#x53D1;&#x5E03;</option>
					<option value="pending">&#x5F85;&#x5BA1;&#x6838;</option>
					<option value="rejected">&#x5DF2;&#x62D2;&#x7EDD;</option>
				</select>
				<button id="load-comments" type="submit">&#x52A0;&#x8F7D;&#x8BC4;&#x8BBA;</button>
			</div>
			<p class="notice">&#x8F93;&#x5165;&#x5BC6;&#x7801;&#x540E;&#x53EF;&#x76F4;&#x63A5;&#x6309;&#x56DE;&#x8F66;&#x6216;&#x70B9;&#x51FB;&#x6309;&#x94AE;&#x52A0;&#x8F7D;&#x3002;</p>
			<div id="admin-notice" class="notice">&#x8F93;&#x5165;&#x540E;&#x53F0;&#x5BC6;&#x7801;&#x540E;&#x5373;&#x53EF;&#x8BFB;&#x53D6;&#x8BC4;&#x8BBA;&#x5217;&#x8868;&#xFF0C;&#x9ED8;&#x8BA4;&#x663E;&#x793A;&#x5DF2;&#x53D1;&#x5E03;&#x8BC4;&#x8BBA;&#x3002;</div>
			</form>
		</section>

		<section class="panel stack">
			<h2>&#x8BC4;&#x8BBA;&#x5217;&#x8868;</h2>
			<div id="comment-list" class="comment-list"></div>
		</section>
	</main>
	<script src="/admin/comments-admin.js" defer></script>
</body>
</html>
